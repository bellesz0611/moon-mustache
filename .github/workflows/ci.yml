name: check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - wasm
          - wasm-gc
          - js
          - native

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit
        run: moon update

      - name: Show MoonBit version
        run: moon version --all

      - name: Run moon fmt check
        run: moon fmt --check

      - name: Run moon info --deny-warn compatibility gate
        if: matrix.target == 'wasm-gc'
        shell: bash
        run: |
          moon info --deny-warn 2>/dev/null || moon info --target all

      - name: Run moon info
        if: matrix.target == 'wasm-gc'
        run: moon info --target all

      - name: Validate documentation links
        if: matrix.target == 'wasm-gc'
        run: python scripts/check_docs.py

      - name: Run moon check with deny-warn
        run: moon check --deny-warn --target ${{ matrix.target }}

      - name: Run moon build with deny-warn
        run: moon build --deny-warn --target ${{ matrix.target }}

      - name: Run moon test with deny-warn
        run: moon test --deny-warn --target ${{ matrix.target }}

      - name: Run showcase smoke test
        run: moon run --target ${{ matrix.target }} showcase

      - name: Run scaffold demo smoke test
        run: moon run --target ${{ matrix.target }} scaffold_demo

      - name: Run spec report smoke test
        run: moon run --target ${{ matrix.target }} spec_report

      - name: Run official spec report smoke test
        run: moon run --target ${{ matrix.target }} official_spec_report

      - name: Run scenario report smoke test
        run: moon run --target ${{ matrix.target }} scenario_report

      - name: Run downstream consumer smoke test
        run: moon run --target ${{ matrix.target }} downstream_consumer

      - name: Run adoption demo smoke test
        run: moon run --target ${{ matrix.target }} adoption_demo

      - name: Run content pipeline demo smoke test
        run: moon run --target ${{ matrix.target }} content_pipeline_demo

      - name: Run starter repo demo smoke test
        run: moon run --target ${{ matrix.target }} starter_repo_demo

      - name: Run incident response demo smoke test
        run: moon run --target ${{ matrix.target }} incident_response_demo

      - name: Run developer release demo smoke test
        run: moon run --target ${{ matrix.target }} developer_release_demo

      - name: Run benchmark smoke test
        if: matrix.target == 'wasm-gc'
        run: |
          mkdir -p _ci_artifacts
          moon run --target ${{ matrix.target }} benchmarks > _ci_artifacts/benchmarks.json
          python scripts/summarize_benchmarks.py _ci_artifacts/benchmarks.json > _ci_artifacts/benchmarks.md

      - name: Enforce core coverage gate
        if: matrix.target == 'wasm-gc'
        run: python scripts/run_coverage.py --minimum 88 --output-dir _ci_artifacts

      - name: Run CLI black-box integration suite
        if: matrix.target == 'js'
        run: |
          mkdir -p _ci_artifacts
          python scripts/test_cli_integration.py --json-output _ci_artifacts/cli-integration.json

      - name: Upload verification artifacts
        if: always() && (matrix.target == 'wasm-gc' || matrix.target == 'js')
        uses: actions/upload-artifact@v7
        with:
          name: verification-evidence-${{ matrix.target }}-${{ github.sha }}
          path: _ci_artifacts
