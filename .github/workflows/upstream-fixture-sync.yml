name: upstream fixture sync

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check pinned mustache/spec commit
        run: |
          mkdir -p _ci_artifacts
          python scripts/check_upstream_fixture_sync.py \
            --json-output _ci_artifacts/upstream-fixture-sync.json | tee _ci_artifacts/upstream-fixture-sync.txt

      - name: Publish sync report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: upstream-fixture-sync
          path: _ci_artifacts/
