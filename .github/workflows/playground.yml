name: playground

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  playground-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit
        run: moon update

      - name: Show MoonBit version
        run: moon version --all

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Build Vue playground
        working-directory: playground
        run: npm run build

      - name: Run deterministic differential suite
        working-directory: playground
        run: npm run differential -- --json-output ../_playground_artifacts/differential.json --failure-output ../_playground_artifacts/differential-failures.json --junit-output ../_playground_artifacts/differential.junit.xml

      - name: Smoke test playground API bridge
        working-directory: playground
        run: npm run smoke

      - name: Upload differential evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: differential-evidence-${{ github.sha }}
          path: _playground_artifacts
          if-no-files-found: warn

  windows-playground-smoke:
    name: Windows browser and API bridge
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit package index
        run: moon update

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Check MoonBit JS target
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path _windows_diagnostics | Out-Null
          $output = & moon check --deny-warn --target js 2>&1
          $status = $LASTEXITCODE
          $output | Tee-Object -FilePath _windows_diagnostics/moon-check.txt
          if ($status -ne 0) {
            $escaped = $output | ForEach-Object { $_ -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A' }
            $annotation = $escaped -join '%0A'
            Write-Output "::error title=Windows moon check failed::$annotation"
            exit $status
          }

      - name: Test MoonBit JS target
        run: moon test --deny-warn --target js

      - name: Build browser bundle on Windows
        working-directory: playground
        run: |
          npm run build

      - name: Verify Windows API bridge discovery
        working-directory: playground
        run: npm run smoke

      - name: Upload Windows diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-playground-diagnostics-${{ github.sha }}
          path: _windows_diagnostics
          if-no-files-found: warn
