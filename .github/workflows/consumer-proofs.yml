name: consumer-proofs

on:
  push:
    branches:
      - main
      - master
    paths:
      - "downstream_consumer/**"
      - "adoption_demo/**"
      - "content_pipeline_demo/**"
      - "starter_repo_demo/**"
      - ".github/workflows/consumer-proofs.yml"
  workflow_dispatch:

jobs:
  consumer-proof-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit
        run: moon update

      - name: Show MoonBit version
        run: moon version --all

      - name: Run consumer demos
        run: |
          mkdir -p _consumer_artifacts
          moon run downstream_consumer > _consumer_artifacts/downstream_consumer.txt
          moon run adoption_demo > _consumer_artifacts/adoption_demo.txt
          moon run content_pipeline_demo > _consumer_artifacts/content_pipeline_demo.txt
          moon run starter_repo_demo > _consumer_artifacts/starter_repo_demo.txt

      - name: Upload consumer proof artifacts
        uses: actions/upload-artifact@v7
        with:
          name: consumer-proof-artifacts
          path: _consumer_artifacts
