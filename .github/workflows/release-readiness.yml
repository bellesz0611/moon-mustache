name: release-readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify-release-surface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit
        run: moon update

      - name: Show MoonBit version
        run: moon version --all

      - name: Run moon info --deny-warn compatibility gate
        shell: bash
        run: |
          moon info --deny-warn 2>/dev/null || moon info --target all

      - name: Run formatting and analysis gates
        run: |
          moon fmt --check
          moon info --target all
          moon check --deny-warn --target wasm-gc
          moon check --deny-warn --target js
          moon test --deny-warn --target wasm-gc
          moon test --deny-warn --target js

      - name: Generate evaluator artifacts
        run: |
          mkdir -p _artifacts
          python scripts/generate_metrics_snapshot.py
          cp docs/METRICS_SNAPSHOT.md _artifacts/metrics_snapshot.md
          moon run showcase > _artifacts/showcase.txt
          moon run spec_report > _artifacts/spec_report.txt
          moon run official_spec_report > _artifacts/official_spec_report.txt
          moon run scenario_report > _artifacts/scenario_report.txt
          moon run downstream_consumer > _artifacts/downstream_consumer.txt
          moon run adoption_demo > _artifacts/adoption_demo.txt
          moon run content_pipeline_demo > _artifacts/content_pipeline_demo.txt
          moon run starter_repo_demo > _artifacts/starter_repo_demo.txt
          moon run incident_response_demo > _artifacts/incident_response_demo.txt
          moon run developer_release_demo > _artifacts/developer_release_demo.txt
          moon run benchmarks > _artifacts/benchmarks.json
          python scripts/summarize_benchmarks.py _artifacts/benchmarks.json > _artifacts/benchmarks.md
          moon run --target js cli --template "{{#user}}{{name}}{{/user}}{{> footer}}" --scan > _artifacts/cli_scan.txt

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Build and smoke test playground
        working-directory: playground
        run: |
          npm run build
          npm run differential
          npm run smoke

      - name: Upload evaluator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-artifacts
          path: _artifacts
