name: deploy-playground

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build browser playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pinned MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit package index
        run: moon update

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install frontend dependencies
        working-directory: playground
        run: npm ci

      - name: Test differential failure minimization
        working-directory: playground
        run: npm run test:differential-minimizer

      - name: Verify MoonBit differential parity
        working-directory: playground
        run: npm run differential

      - name: Build Vue and MoonBit browser bundle
        working-directory: playground
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: playground/dist

  deploy:
    name: Deploy browser playground
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
