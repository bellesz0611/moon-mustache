name: site

on:
  push:
    branches:
      - main
      - master
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  package-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site-preview-${{ github.sha }}
          path: site
